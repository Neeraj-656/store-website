
services:

  # ─────────────────────────────────────────────
  # 🧠 Admin Service
  # ─────────────────────────────────────────────
  admin-service:
    build: .
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development

      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:5432/adminDB?pgbouncer=true

      DATABASE_CONNECTION_LIMIT: "5"
      DATABASE_POOL_TIMEOUT: "10"

      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672

      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      INTERNAL_SIGNING_KEY_PUBLIC: ${INTERNAL_SIGNING_KEY_PUBLIC}

      VENDOR_SERVICE_URL:  http://vendor-service:3005
      CATALOG_SERVICE_URL: http://catalog-service:3002
      ORDER_SERVICE_URL:   http://order-service:3001
      PAYMENT_SERVICE_URL: http://payment-service:3004
      PAYOUT_SERVICE_URL:  http://payout-service:3007
      REVIEW_SERVICE_URL:  http://review-service:3006

      OUTBOX_RETENTION_DAYS: "7"
      MSG_ID_RETENTION_DAYS: "30"

    depends_on:
      pgbouncer:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

    restart: unless-stopped



  # ─────────────────────────────────────────────
  # 🚀 PgBouncer (Correct ENV names)
  # ─────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: adminDB

      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256

      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 2
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 5
      SERVER_IDLE_TIMEOUT: 600

    ports:
      - "6432:5432"

    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432"]
      interval: 5s
      timeout: 3s
      retries: 5

    depends_on:
      postgres:
        condition: service_healthy

    restart: unless-stopped



  # ─────────────────────────────────────────────
  # 🗄 PostgreSQL 16
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: adminDB

    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=512MB

    ports:
      - "5436:5432"

    volumes:
      - pg_admin:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

    restart: unless-stopped



  # ─────────────────────────────────────────────
  # 🐇 RabbitMQ
  # ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5675:5672"
      - "15675:15672"

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped


volumes:
  pg_admin: